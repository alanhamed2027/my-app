version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: it_asset_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: it_asset_management
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: it_asset_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=mysql://root:root@db:3306/it_asset_management
      - JWT_SECRET=super-secret-government-key-2026
      - JWT_EXPIRES_IN=1d
      - CLIENT_URL=http://localhost

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: it_asset_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
